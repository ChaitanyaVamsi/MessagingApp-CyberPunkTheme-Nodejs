events {}

http {
  server {
    listen 80;

    # Frontend
    location / {
      proxy_pass http://frontend:3000;
      proxy_set_header Host $host;
    }

    # Grafana
    location /grafana/ {
      proxy_pass http://grafana:3000/;
      proxy_set_header Host $host;
    }

    # Prometheus
    location /prometheus/ {
      proxy_pass http://prometheus:9090/;
      proxy_set_header Host $host;
    }
  }
}