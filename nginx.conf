events {}

http {
  server {
    listen 80;

    # Frontend
    location / {
      proxy_pass http://frontend:3000;
    }

    # Grafana (IMPORTANT HEADERS)
    location /grafana/ {
      proxy_pass http://grafana:3000/grafana/;

    }

    # Prometheus
    location /prometheus/ {
  proxy_pass http://prometheus:9090/prometheus/;
    }

  }
}